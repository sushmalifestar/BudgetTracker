
<ion-content class="ion-padding">
  
  <ion-card class="balance-card" button (click)="goToStatement()">

    <ion-card-content class="balance-content">

      <div class="balance-left">
    
        <p class="balance-label">
          Current Balance
        </p>
    
        <p class="statement-link">
          View Statement →
        </p>
    
      </div>
    
      <div class="balance-amount">
        <span class="currency">₹</span>
        <span class="value">{{ balance | formatAmount }}</span>
      </div>
    
    </ion-card-content>

  </ion-card>

  <ion-grid>

    <ion-row>
      <ion-col size="6">
        <ion-card class="summary-card income-card" button (click)="goToIncome()">
          <ion-card-content>
            <p class="label-text">Income</p>
            <div class="amount-text income-text">
              <span class="currency">₹</span>
              <span class="value">{{ totalIncome | formatAmount }}</span>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card class="summary-card expense-card " button (click)="goToExpense()">
          <ion-card-content>
            <p class="label-text">Expenses</p>
            <div class="amount-text expense-text">
              <span class="currency">₹</span>
              <span class="value">{{ totalExpenses | formatAmount }}</span>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="6">
        <ion-card class="summary-card savings-card" button (click)="goToSavings()">
          <ion-card-content>
            <p class="label-text">Savings</p>
            <div class="amount-text savings-text">
              <span class="currency">₹</span>
              <span class="value">{{ totalSavings | formatAmount }}</span>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>

  </ion-grid>

</ion-content>
